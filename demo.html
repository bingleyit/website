<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cloudpad — demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap">
<style>
/* ── EXACT CLOUDPAD CSS ─────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --accent:#006cd1;
  --bg:#ffffff;
  --surface:#fafafa;
  --border:#e8e4de;
  --border-light:#f0ece6;
  --text:#1a1714;
  --text-dim:#9a9490;
  --text-light:#c4bfb8;
  --done:#c4bfb8;
  --header-h:48px;
  --bottom-h:44px;
  --font-ui:'Inter',sans-serif;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
body *{font-family:var(--font-ui);}
.topbar-logo-text{font-family:'Caveat',cursive!important;}

/* TOPBAR — exact copy */
.topbar{
  height:var(--header-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;background:var(--accent);border-bottom:1px solid rgba(0,0,0,0.1);
  flex-shrink:0;position:relative;z-index:50;
}
.topbar-left{display:flex;align-items:center;gap:12px;position:relative;z-index:2;}
.topbar-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;cursor:pointer;z-index:1;}
.topbar-right{display:flex;align-items:center;gap:2px;position:relative;z-index:2;}
.topbar-logo-text{font-family:'Caveat',cursive;font-size:1.2rem;font-weight:700;color:#fff;letter-spacing:-0.5px;line-height:1;}
.topbar-datetime{display:flex;flex-direction:column;align-items:flex-start;gap:0;padding:0 6px 0 2px;line-height:1;}
.topbar-datetime-time{font-size:0.82rem;font-weight:700;color:#fff;letter-spacing:0.02em;}
.topbar-datetime-date{font-size:0.58rem;color:rgba(255,255,255,0.72);margin-top:2px;}
.icon-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.85);padding:5px 6px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:color 0.12s,background 0.12s;line-height:1;}
.icon-btn svg{width:15px;height:15px;stroke-width:1.8;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round;}
.icon-btn:hover{color:#fff;background:rgba(255,255,255,0.15);}
.pomo-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.85);padding:4px 8px;border-radius:6px;font-size:0.72rem;letter-spacing:0.01em;display:flex;align-items:center;gap:5px;transition:background 0.12s,color 0.12s;white-space:nowrap;}
.pomo-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;flex-shrink:0;}
.pomo-btn:hover,.pomo-btn.running{color:#fff;background:rgba(255,255,255,0.15);}
.pomo-time{font-weight:500;min-width:36px;text-align:left;}
.user-avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.22);color:#fff;border:1.5px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0;}
.topbar-user-btn{display:flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;padding:3px 6px 3px 8px;border-radius:20px;transition:background 0.13s;}
.topbar-user-btn:hover{background:rgba(255,255,255,0.14);}
.user-label{color:rgba(255,255,255,0.88);font-size:0.72rem;font-weight:300;}
.demo-badge{font-family:'DM Mono',monospace;font-size:0.58rem;background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.9);padding:2px 8px;border-radius:20px;letter-spacing:0.08em;}

/* PAD TABS — exact copy */
.pad-tabs-row{
  display:flex;align-items:stretch;
  border-bottom:1px solid rgba(0,0,0,0.08);
  background:color-mix(in srgb,var(--accent) 70%,white 30%);
  flex-shrink:0;position:relative;z-index:40;justify-content:center;
}
.pad-tabs{
  display:flex;align-items:center;gap:0;
  background:transparent;
  flex-shrink:0;padding:0 20px;overflow-x:auto;overflow-y:hidden;
}
.pad-tabs::-webkit-scrollbar{display:none;}
.pad-tab{
  background:none;border:none;border-bottom:2px solid transparent;
  padding:9px 14px;font-size:0.7rem;
  letter-spacing:0.05em;text-transform:uppercase;color:rgba(255,255,255,0.6);
  cursor:pointer;transition:color 0.15s,border-color 0.15s,background 0.12s;margin-bottom:-1px;
  display:flex;align-items:center;gap:5px;
}
.pad-tab.active{color:#fff;border-bottom-color:#fff;}
.pad-tab:hover:not(.active){color:#fff;background:rgba(255,255,255,0.12);border-radius:4px 4px 0 0;}
.pad-tab-lbl{font-weight:600;letter-spacing:0.08em;}
.pad-tab.active .pad-tab-lbl{font-weight:700;}
.pad-tab-icon svg{width:13px;height:13px;opacity:0.7;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.pad-tab.active .pad-tab-icon svg,.pad-tab:hover .pad-tab-icon svg{opacity:1;}

/* APP BODY */
.app-body{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-height:0;background:#f5f4f2;}

/* WEEK NAV ARROWS — exact */
.week-nav-arrow{
  position:absolute;top:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  width:28px;height:44px;cursor:pointer;
  background:transparent;border:none;box-shadow:none;
  color:var(--accent);font-size:1.7rem;line-height:1;
  transition:background 0.15s,opacity 0.15s;
  user-select:none;opacity:0.7;
}
.week-nav-arrow:hover{background:rgba(0,0,0,0.05);opacity:1;}
.week-nav-arrow.left{left:0;}
.week-nav-arrow.right{right:0;}

/* DAY COLUMNS — exact */
.day-cols{
  display:flex;flex:1 1 50%;overflow:hidden;
  gap:10px;padding:10px 10px 0;
  background:#f5f4f2;min-height:0;
}
.day-col{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;min-width:0;min-height:0;
  background:var(--bg);
  border-radius:8px 8px 0 0;
}
.day-col.is-weekend{background:#fafaf9;}
.day-col.is-weekend .day-hdr{background:#f7f5f2;}

/* DAY HEADER — exact */
.day-hdr{
  padding:14px 16px 10px;
  flex-shrink:0;
  border-bottom:2px solid transparent;
  position:relative;
}
.day-col.is-today .day-hdr{border-bottom-color:var(--accent);}
.day-date-sm{
  font-family:'DM Mono',monospace;font-size:0.58rem;font-weight:400;
  color:var(--text-light);letter-spacing:0.1em;margin-bottom:4px;
  text-transform:uppercase;
}
.day-name-lg{
  font-weight:800;
  font-size:clamp(0.95rem,2vw,1.3rem);
  letter-spacing:-0.03em;text-transform:uppercase;
  color:var(--text);line-height:1;
}
.day-col.is-today .day-name-lg{color:var(--accent);}

/* TASK SCROLL */
.task-scroll{flex:1;overflow-y:auto;padding-bottom:4px;}
.task-scroll::-webkit-scrollbar{width:2px;}
.task-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* TASK ROW — exact */
.task-row{
  display:flex;align-items:center;
  padding:8px 16px;min-height:34px;
  transition:background 0.1s;
  gap:10px;position:relative;overflow:hidden;
}
.task-row::after{
  content:'';position:absolute;bottom:0;left:42px;right:16px;
  height:1px;background:var(--border-light);
}
.task-row:last-child::after{display:none;}
.task-row:hover{background:rgba(0,0,0,0.025);}

/* CHECKBOX — exact: circle not square */
.task-check{
  width:15px;height:15px;border-radius:50%;
  border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;
  transition:background 0.15s,border-color 0.15s;position:relative;
}
.task-row:hover .task-check{border-color:var(--text-dim);}
.task-row.done .task-check{background:var(--done);border-color:var(--done);}
.task-row.done .task-check::after{
  content:'';position:absolute;top:2px;left:4px;
  width:3px;height:6px;
  border:1.5px solid white;border-top:none;border-left:none;
  transform:rotate(45deg);
}

/* TASK TEXT — exact */
.task-txt{
  font-weight:300;font-size:0.86rem;color:var(--text);
  flex:1;line-height:1.4;cursor:pointer;
}
.task-row.done .task-txt{text-decoration:line-through;color:var(--done);}

/* TASK ACTIONS — slide in on hover */
.task-actions{
  position:absolute;right:0;top:0;bottom:0;
  display:flex;align-items:center;gap:2px;
  padding:0 8px 0 24px;
  background:linear-gradient(90deg,transparent,var(--bg) 24px,var(--bg));
  transform:translateX(102%);
  transition:transform 0.2s cubic-bezier(0.4,0,0.2,1);
  pointer-events:none;
}
.task-row:hover .task-actions{transform:translateX(0);pointer-events:auto;}
.task-del{background:none;border:none;cursor:pointer;color:var(--text-light);font-size:0.8rem;padding:2px 4px;transition:color 0.1s;line-height:1;}
.task-del:hover{color:#c0392b;}

/* HIGHLIGHT ROWS — exact */
.task-row.hl-yellow{background:rgba(254,230,90,0.18);border-left:3px solid #f59e0b;padding-left:13px;}
.task-row.hl-yellow:hover{background:rgba(254,230,90,0.28);}
.task-row.hl-yellow .task-actions{background:linear-gradient(90deg,transparent,rgba(254,244,180,0.97) 24px,rgba(254,244,180,0.97));}
.task-row.hl-blue{background:rgba(147,197,253,0.2);border-left:3px solid #3b82f6;padding-left:13px;}
.task-row.hl-blue:hover{background:rgba(147,197,253,0.32);}
.task-row.hl-blue .task-actions{background:linear-gradient(90deg,transparent,rgba(224,236,254,0.97) 24px,rgba(224,236,254,0.97));}
.task-row.hl-green{background:rgba(134,239,172,0.2);border-left:3px solid #22c55e;padding-left:13px;}
.task-row.hl-green:hover{background:rgba(134,239,172,0.32);}
.task-row.hl-green .task-actions{background:linear-gradient(90deg,transparent,rgba(218,252,228,0.97) 24px,rgba(218,252,228,0.97));}

/* ADD ROW — exact */
.add-row{
  display:flex;align-items:center;padding:7px 16px;flex-shrink:0;gap:10px;
  border-top:1px solid var(--border-light);
}
.add-row::before{
  content:'';width:15px;height:15px;border-radius:50%;
  border:1.5px dashed var(--border-light);flex-shrink:0;
}
.add-row:focus-within::before{border-color:var(--text-dim);border-style:solid;}
.add-input{
  width:100%;background:none;border:none;
  font-weight:300;font-size:0.86rem;
  color:var(--text);padding:3px 0;outline:none;
}
.add-input::placeholder{color:var(--text-light);}
.add-input:focus::placeholder{color:var(--border);}

/* SOMEDAY WRAP — exact */
.someday-wrap{
  background:#f5f4f2;display:flex;flex-direction:column;
  overflow:hidden;flex-shrink:0;
  height:160px;
}

/* SOMEDAY TABS (.stab) — exact */
.someday-tabs{
  display:flex;align-items:center;gap:0;
  padding:0 20px;border-bottom:1px solid var(--border);
  flex-shrink:0;height:38px;
  overflow-x:auto;background:var(--bg);
}
.someday-tabs::-webkit-scrollbar{display:none;}
.stab{
  display:flex;align-items:center;gap:5px;
  padding:0 14px;height:100%;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:0.7rem;font-weight:400;
  letter-spacing:0.06em;text-transform:uppercase;
  color:var(--text-dim);border-bottom:2px solid transparent;
  transition:color 0.15s;white-space:nowrap;flex-shrink:0;
  position:relative;top:1px;
  background:none;border-left:none;border-right:none;border-top:none;
}
.stab:hover{color:var(--text);}
.stab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* SOMEDAY LISTS — exact: shown as horizontal columns */
.someday-lists{display:flex;flex:1;overflow:hidden;}
.someday-col{
  flex:1;display:flex;flex-direction:column;
  border-right:1px solid var(--border-light);overflow:hidden;min-width:0;
  background:var(--bg);
}
.someday-col:last-child{border-right:none;}
.someday-col-hdr{
  padding:8px 16px 5px;flex-shrink:0;border-bottom:1px solid var(--border-light);
}
.someday-col-name{
  font-family:'DM Mono',monospace;font-weight:600;
  font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);
}
.someday-scroll{flex:1;overflow-y:auto;}
.someday-scroll::-webkit-scrollbar{width:2px;}
.someday-scroll::-webkit-scrollbar-thumb{background:var(--border);}

/* Someday items use .task-row styling */
.someday-item{
  display:flex;align-items:center;
  padding:6px 16px;min-height:30px;
  transition:background 0.1s;gap:10px;
  border-bottom:1px solid var(--border-light);
  cursor:pointer;
}
.someday-item:hover{background:rgba(0,0,0,0.025);}
.someday-item .task-check{width:13px;height:13px;}
.someday-item.done .task-check{background:var(--done);border-color:var(--done);}
.someday-item.done .task-check::after{content:'';position:absolute;top:1px;left:3px;width:3px;height:5px;border:1.5px solid white;border-top:none;border-left:none;transform:rotate(45deg);}
.someday-item.done .someday-txt{text-decoration:line-through;color:var(--done);}
.someday-txt{font-weight:300;font-size:0.82rem;color:var(--text);line-height:1.4;flex:1;}

.someday-add{padding:4px 16px 8px;flex-shrink:0;display:flex;align-items:center;gap:8px;}
.someday-add::before{
  content:'';width:12px;height:12px;border-radius:50%;
  border:1.5px dashed var(--border-light);flex-shrink:0;
}
.someday-add:focus-within::before{border-color:var(--text-dim);border-style:solid;}
.someday-add-input{
  width:100%;background:none;border:none;
  font-weight:300;font-size:0.82rem;
  color:var(--text);padding:3px 0;outline:none;
}
.someday-add-input::placeholder{color:var(--text-light);}

/* BOTTOM BAR — exact */
.bottom-bar{
  height:var(--bottom-h);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;flex-shrink:0;background:var(--bg);
}
.bottom-left,.bottom-right{display:flex;align-items:center;gap:4px;}
.bottom-bar .icon-btn{color:var(--text-dim);}
.bottom-bar .icon-btn:hover{color:var(--text);background:var(--surface);}
.bottom-bar .icon-btn svg{stroke:currentColor;}
.page-btn{
  background:none;border:none;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:0.75rem;font-weight:300;
  color:var(--text-dim);padding:4px 7px;border-radius:3px;
  transition:background 0.12s,color 0.12s;
}
.page-btn:hover{background:var(--surface);color:var(--text);}
.page-btn.active{color:var(--accent);font-weight:400;}
.week-range{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--text-dim);padding:0 6px;}

/* QUICK ADD FAB */
.quick-add-fab{
  position:fixed;bottom:52px;right:20px;
  width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,108,209,0.35);
  transition:filter 0.15s,transform 0.15s;z-index:100;
}
.quick-add-fab:hover{filter:brightness(1.1);transform:scale(1.05);}
.quick-add-fab svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;}

/* POMODORO PANEL */
.pomo-panel{
  position:fixed;z-index:800;background:#fff;border:1px solid var(--border);
  border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.14);
  padding:20px;min-width:220px;text-align:center;
  top:54px;right:100px;display:none;
}
.pomo-panel.open{display:block;animation:fadeIn 0.15s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.pomo-panel-title{font-size:0.62rem;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;font-family:'DM Mono',monospace;}
.pomo-panel-clock{font-size:2.6rem;font-weight:300;color:var(--text);letter-spacing:-0.03em;line-height:1;margin-bottom:4px;}
.pomo-panel-label{font-size:0.75rem;color:var(--text-dim);margin-bottom:16px;}
.pomo-panel-btns{display:flex;gap:8px;justify-content:center;margin-bottom:12px;}
.pomo-action-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 16px;font-size:0.72rem;color:var(--text);cursor:pointer;transition:border-color 0.12s,background 0.12s;}
.pomo-action-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.pomo-action-btn:hover:not(.primary){border-color:var(--accent);color:var(--accent);}
.pomo-progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;}
.pomo-progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear;}
.pomo-sessions-dots{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text-light);margin-top:8px;}
.demo-reset-btn{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);padding:3px 10px;border-radius:4px;cursor:pointer;transition:color 0.12s;}
.demo-reset-btn:hover{color:var(--accent);border-color:var(--accent);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-datetime">
      <div class="topbar-datetime-time" id="tb-time">--:--</div>
      <div class="topbar-datetime-date" id="tb-date"></div>
    </div>
  </div>
  <div class="topbar-center">
    <span class="topbar-logo-text">cloudpad</span>
  </div>
  <div class="topbar-right">
    <span class="demo-badge">demo</span>
    <button class="pomo-btn" id="pomo-btn" onclick="togglePomoPanel()">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><polyline points="8,4.5 8,8 10.5,9.5"/></svg>
      <span class="pomo-time" id="pomo-display">25:00</span>
    </button>
    <button class="icon-btn" title="notifications">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
    <button class="topbar-user-btn">
      <span class="user-label">demo</span>
      <div class="user-avatar">D</div>
    </button>
  </div>
</div>

<!-- PAD TABS -->
<div class="pad-tabs-row">
  <div class="pad-tabs" id="pad-tabs"></div>
</div>

<!-- APP BODY -->
<div class="app-body">
  <button class="week-nav-arrow left" onclick="shiftWeek(-1)">‹</button>
  <button class="week-nav-arrow right" onclick="shiftWeek(1)">›</button>
  <div class="day-cols" id="day-cols"></div>

  <!-- SOMEDAY PANEL -->
  <div class="someday-wrap">
    <div class="someday-tabs" id="someday-tabs-bar"></div>
    <div class="someday-lists" id="someday-lists"></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="bottom-left">
    <button class="icon-btn" title="view">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
    </button>
    <button class="icon-btn" title="account">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
  </div>
  <div class="bottom-right">
    <button class="demo-reset-btn" onclick="resetDemo()">↺ reset</button>
    <span class="week-range" id="week-range"></span>
    <button class="page-btn" onclick="shiftWeek(-1)">← prev</button>
    <button class="page-btn" onclick="shiftWeek(1)">next →</button>
  </div>
</div>

<!-- QUICK ADD FAB -->
<button class="quick-add-fab" onclick="jumpToToday()" title="Jump to today / add task">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- POMODORO PANEL -->
<div class="pomo-panel" id="pomo-panel">
  <div class="pomo-panel-title">Pomodoro Timer</div>
  <div class="pomo-panel-clock" id="pomo-clock">25:00</div>
  <div class="pomo-panel-label" id="pomo-label">Ready to focus?</div>
  <div class="pomo-panel-btns">
    <button class="pomo-action-btn primary" id="pomo-start-btn" onclick="pomoToggle()">Start</button>
    <button class="pomo-action-btn" onclick="pomoReset()">Reset</button>
  </div>
  <div class="pomo-progress"><div class="pomo-progress-bar" id="pomo-bar" style="width:100%"></div></div>
  <div class="pomo-sessions-dots" id="pomo-dots">○ ○ ○ ○</div>
</div>

<script>
// ── DEMO DATA ────────────────────────────────────────────────
const DEMO_TASKS_BY_OFFSET = {
  0:[  // Mon
    {text:'Design system review',done:true},
    {text:'Update component docs',done:true},
    {text:'Client brief call',done:false},
    {text:'Merge PR #142',done:false,hl:'hl-yellow'},
  ],
  1:[  // Tue
    {text:'Fix auth edge case',done:true},
    {text:'Code review — Simon',done:true},
    {text:'Deploy to staging',done:false},
    {text:'Update README',done:false},
  ],
  2:[  // Wed (today)
    {text:'Team standup 9am',done:true,hl:'hl-blue'},
    {text:'Write unit tests',done:false},
    {text:'Review open PRs',done:false,hl:'hl-yellow'},
    {text:'Deploy cloudpad v2.1 🚀',done:false,hl:'hl-green'},
    {text:'Send invoice',done:false},
  ],
  3:[  // Thu
    {text:'Sprint planning',done:false},
    {text:'Blog post draft',done:false},
    {text:'Database backup check',done:false},
  ],
  4:[  // Fri
    {text:'Weekly retro',done:false},
    {text:'Side project — cloudpad',done:false},
    {text:'Clear inbox',done:false},
  ],
  5:[  // Sat
    {text:'Read — Shape Up 📖',done:false},
    {text:'Gym',done:false},
  ],
  6:[  // Sun
    {text:'Plan next week 📋',done:false},
    {text:'Rest 🌿',done:false},
  ],
};

const SOMEDAY_LISTS = {
  Inbox:[
    {text:'Set up CI/CD pipeline',done:false},
    {text:'Update landing page copy',done:false},
    {text:'Add dark mode support',done:false},
    {text:'Fix mobile nav overflow',done:true},
    {text:'A/B test hero headline',done:false},
  ],
  Ideas:[
    {text:'AI mood detection via typing cadence',done:false},
    {text:'Browser extension — quick add',done:false},
    {text:'Offline mode with sync queue',done:false},
    {text:'Template pads',done:false},
  ],
  Shopping:[
    {text:'Mechanical keyboard',done:false},
    {text:'Standing desk mat',done:true},
    {text:'Noise cancelling headphones',done:false},
    {text:'USB-C hub',done:false},
  ],
  Life:[
    {text:'Book dentist appointment',done:false},
    {text:'Renew car rego',done:false},
    {text:'Call mum',done:false},
    {text:'Buy birthday gift — Dad',done:false},
  ],
};

const PAD_TABS_DATA = [
  {id:'tasks',icon:'<svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',label:'Tasks'},
  {id:'notes',icon:'<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',label:'Notes'},
  {id:'ideas',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',label:'Ideas'},
  {id:'finance',icon:'<svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',label:'Finance'},
];

// ── STATE ────────────────────────────────────────────────────
let weekOffset = 0;
let tasks = {};
let someday = {};
let activePad = 'tasks';

// Pomodoro
const POMO_TOTAL = 25 * 60;
let pomoSecs = POMO_TOTAL;
let pomoRunning = false;
let pomoInterval = null;
let pomoSession = 0;

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function getMonday(offset) {
  const now = new Date();
  const d = now.getDay();
  const diff = d === 0 ? -6 : 1 - d;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}
function dateKey(d){return d.toISOString().slice(0,10);}
function isToday(d){const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return x.getTime()===t.getTime();}
function isWeekend(d){const day=d.getDay();return day===0||day===6;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function seedWeek(off) {
  const mon = getMonday(off);
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const k=dateKey(d);
    if(!tasks[k]){
      tasks[k] = (off===0 && DEMO_TASKS_BY_OFFSET[i])
        ? DEMO_TASKS_BY_OFFSET[i].map(t=>({...t}))
        : [];
    }
  }
}

function resetDemo(){
  weekOffset=0; tasks={}; someday={};
  Object.keys(SOMEDAY_LISTS).forEach(k=>someday[k]=SOMEDAY_LISTS[k].map(t=>({...t})));
  activePad='tasks';
  pomoSecs=POMO_TOTAL; pomoRunning=false; clearInterval(pomoInterval);
  document.getElementById('pomo-panel').classList.remove('open');
  document.getElementById('pomo-btn').classList.remove('running');
  render();
}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  seedWeek(weekOffset);
  renderPadTabs();
  renderDayCols();
  renderSomeday();
  renderWeekRange();
}

function renderPadTabs(){
  document.getElementById('pad-tabs').innerHTML = PAD_TABS_DATA.map(t=>`
    <button class="pad-tab${t.id===activePad?' active':''}" onclick="setActivePad('${t.id}')">
      <span class="pad-tab-icon">${t.icon}</span>
      <span class="pad-tab-lbl">${t.label}</span>
    </button>
  `).join('');
}

function setActivePad(id){activePad=id;renderPadTabs();}

function renderDayCols(){
  const mon = getMonday(weekOffset);
  const container = document.getElementById('day-cols');
  container.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const k=dateKey(d), today=isToday(d), weekend=isWeekend(d);
    const dayTasks=tasks[k]||[];
    const col=document.createElement('div');
    col.className='day-col'+(today?' is-today':'')+(weekend?' is-weekend':'');
    col.innerHTML=`
      <div class="day-hdr">
        <div class="day-date-sm">${MONTHS[d.getMonth()]} ${d.getDate()}</div>
        <div class="day-name-lg">${DAY_SHORT[d.getDay()]}</div>
      </div>
      <div class="task-scroll" id="ts-${k}">
        ${dayTasks.map((t,ti)=>taskRowHTML(k,ti,t)).join('')}
      </div>
      <div class="add-row">
        <input class="add-input" placeholder="add task…" data-key="${k}" onkeydown="handleAdd(event,'${k}')">
      </div>
    `;
    container.appendChild(col);
  }
}

function taskRowHTML(key,ti,t){
  return `<div class="task-row${t.done?' done':''}${t.hl?' '+t.hl:''}" data-key="${key}" data-ti="${ti}">
    <div class="task-check" onclick="toggleTask(event,'${key}',${ti})"></div>
    <div class="task-txt">${esc(t.text)}</div>
    <div class="task-actions">
      <button class="task-del" onclick="delTask(event,'${key}',${ti})">✕</button>
    </div>
  </div>`;
}

function renderSomeday(){
  const lists = Object.keys(someday);
  // Tabs bar
  document.getElementById('someday-tabs-bar').innerHTML = lists.map(k=>`
    <button class="stab" style="color:var(--accent);border-bottom-color:var(--accent);opacity:1">${k}</button>
  `).join('');
  // Columns side by side
  document.getElementById('someday-lists').innerHTML = lists.map(k=>`
    <div class="someday-col" id="scol-${k}">
      <div class="someday-col-hdr"><div class="someday-col-name">${k}</div></div>
      <div class="someday-scroll">
        ${someday[k].map((item,si)=>`
          <div class="someday-item${item.done?' done':''}" onclick="toggleSomeday('${k}',${si})">
            <div class="task-check" style="width:13px;height:13px;${item.done?'background:var(--done);border-color:var(--done)':'border:1.5px solid var(--border)'}"></div>
            <div class="someday-txt">${esc(item.text)}</div>
          </div>
        `).join('')}
      </div>
      <div class="someday-add">
        <input class="someday-add-input" placeholder="add to ${k.toLowerCase()}…" onkeydown="handleSomedayAdd(event,'${k}')">
      </div>
    </div>
  `).join('');
}

function renderWeekRange(){
  const mon=getMonday(weekOffset), sun=new Date(mon);sun.setDate(mon.getDate()+6);
  document.getElementById('week-range').textContent=
    `${MONTHS[mon.getMonth()]} ${mon.getDate()} – ${MONTHS[sun.getMonth()]} ${sun.getDate()}`;
}

// ── ACTIONS ─────────────────────────────────────────────────
function toggleTask(e,key,ti){
  e.stopPropagation();
  tasks[key][ti].done=!tasks[key][ti].done;
  const row=document.querySelector(`[data-key="${key}"][data-ti="${ti}"]`);
  if(row)row.classList.toggle('done',tasks[key][ti].done);
}
function delTask(e,key,ti){
  e.stopPropagation();
  tasks[key].splice(ti,1);
  const ts=document.getElementById('ts-'+key);
  if(ts)ts.innerHTML=tasks[key].map((t,i)=>taskRowHTML(key,i,t)).join('');
}
function handleAdd(e,key){
  if(e.key!=='Enter')return;
  const v=e.target.value.trim();if(!v)return;
  if(!tasks[key])tasks[key]=[];
  tasks[key].push({text:v,done:false});
  const ts=document.getElementById('ts-'+key);
  if(ts)ts.innerHTML=tasks[key].map((t,i)=>taskRowHTML(key,i,t)).join('');
  e.target.value='';
}
function toggleSomeday(list,si){
  someday[list][si].done=!someday[list][si].done;
  renderSomeday();
}
function handleSomedayAdd(e,list){
  if(e.key!=='Enter')return;
  const v=e.target.value.trim();if(!v)return;
  someday[list].push({text:v,done:false});
  renderSomeday();
}
function shiftWeek(dir){weekOffset+=dir;render();}
function jumpToToday(){
  weekOffset=0;render();
  setTimeout(()=>{
    const k=dateKey(new Date());
    const inp=document.querySelector(`.add-input[data-key="${k}"]`);
    if(inp)inp.focus();
  },50);
}

// ── POMODORO ─────────────────────────────────────────────────
function togglePomoPanel(){document.getElementById('pomo-panel').classList.toggle('open');}
function updatePomoUI(){
  const m=String(Math.floor(pomoSecs/60)).padStart(2,'0');
  const s=String(pomoSecs%60).padStart(2,'0');
  const txt=m+':'+s;
  document.getElementById('pomo-display').textContent=txt;
  document.getElementById('pomo-clock').textContent=txt;
  document.getElementById('pomo-bar').style.width=(pomoSecs/POMO_TOTAL*100)+'%';
  document.getElementById('pomo-dots').textContent=['○','○','○','○'].map((_,i)=>i<pomoSession?'●':'○').join(' ');
  document.getElementById('pomo-label').textContent=pomoRunning?'Focus session running…':(pomoSecs===POMO_TOTAL?'Ready to focus?':'Paused');
  document.getElementById('pomo-start-btn').textContent=pomoRunning?'Pause':'Start';
  document.getElementById('pomo-btn').classList.toggle('running',pomoRunning);
}
function pomoToggle(){
  if(pomoRunning){pomoRunning=false;clearInterval(pomoInterval);}
  else{
    pomoRunning=true;
    pomoInterval=setInterval(()=>{
      if(--pomoSecs<=0){pomoSecs=POMO_TOTAL;pomoRunning=false;clearInterval(pomoInterval);pomoSession=Math.min(pomoSession+1,4);}
      updatePomoUI();
    },1000);
  }
  updatePomoUI();
}
function pomoReset(){pomoRunning=false;clearInterval(pomoInterval);pomoSecs=POMO_TOTAL;updatePomoUI();}

// Close pomo on outside click
document.addEventListener('click',e=>{
  const p=document.getElementById('pomo-panel'),b=document.getElementById('pomo-btn');
  if(p.classList.contains('open')&&!p.contains(e.target)&&!b.contains(e.target))p.classList.remove('open');
});

// ── CLOCK ────────────────────────────────────────────────────
function tick(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('tb-time').textContent=h+':'+m;
  document.getElementById('tb-date').textContent=DAY_SHORT[n.getDay()]+', '+MONTHS[n.getMonth()]+' '+n.getDate();
}

// ── INIT ────────────────────────────────────────────────────
resetDemo();
tick();
updatePomoUI();
setInterval(tick,30000);
</script>
</body>
